<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submission received — archon-memory-core</title>
  <meta name="robots" content="noindex">
  <style>
    :root {
      --bg: #0d1117; --bg-card: #1c2128; --border: #30363d;
      --text: #e6edf3; --text-muted: #8b949e; --text-subtle: #6e7681;
      --blue: #58a6ff; --green: #3fb950;
      --mono: "JetBrains Mono", "Fira Code", Consolas, monospace;
      --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text); font-family: var(--sans);
      line-height: 1.6; min-height: 100vh; display: grid; place-items: center; padding: 48px 24px;
    }
    .card {
      max-width: 560px; width: 100%; background: var(--bg-card);
      border: 1px solid var(--border); border-radius: 12px; padding: 48px 40px; text-align: center;
    }
    h1 { font-size: 32px; font-weight: 800; letter-spacing: -.02em; margin-bottom: 16px; }
    .accent { color: var(--green); }
    p { font-size: 16px; color: var(--text-muted); margin-bottom: 12px; }
    .meta { font-family: var(--mono); font-size: 12px; color: var(--text-subtle); margin-top: 24px; letter-spacing: .04em; }
    a { color: var(--blue); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .btn {
      display: inline-block; margin-top: 28px; padding: 12px 24px;
      background: var(--blue); color: #0d1117; font-weight: 600; font-size: 15px;
      border-radius: 8px; text-decoration: none; transition: transform .2s ease;
    }
    .btn:hover { transform: translateY(-1px); text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1><span class="accent">✓</span> Submission received</h1>
    <p>Thanks for submitting your memory system to AMB. We'll reply within 48 hours with the eval harness package and run instructions.</p>
    <p>If you don't hear back, check spam — or email <a href="mailto:benchmark@divergencerouter.com">benchmark@divergencerouter.com</a> directly.</p>
    <a href="/amc/" class="btn">← Back to benchmark</a>
    <div class="meta">archon-memory-core · AMB v2.3</div>
  </div>
</body>
</html>
